<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>御言葉サプリ | Eden Gold Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Shippori+Mincho:wght@500;600&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* エデンの園×純金のパレット */
            --eden-dark: #0A1108; /* 深い森の闇 */
            --eden-green: #1C331A; /* 豊かな葉の色 */
            --gold-light: #FCF6BA;
            --gold-main: #D4AF37;
            --gold-dark: #AA771C;
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --glass-bg: rgba(10, 17, 8, 0.75); /* 森の空気を感じるダークグラス */
            --glass-border: rgba(212, 175, 55, 0.45);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: var(--eden-dark);
            color: #fff;
            display: flex; justify-content: center; align-items: center;
            min-height: 100dvh;
            overscroll-behavior: none;
            overflow: hidden;
        }

        /* --- エデンの園 背景画像 --- */
        #bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80'); /* 初期: 光の差し込む森 */
            transition: background-image 1.5s ease-in-out;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(10,17,8,0.2) 0%, rgba(10,17,8,0.85) 100%);
            z-index: 2;
            transition: opacity 0.8s;
        }

        /* --- メインメニューコンテナ（常に表示） --- */
        #ui-wrapper {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 92%; max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 25px rgba(212,175,55,0.15);
            text-align: center;
            display: flex; flex-direction: column; gap: 2.5vh;
            border: 1px solid var(--glass-border);
        }

        header h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.8rem; margin: 0; letter-spacing: 0.1em;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.9));
        }

        header p { 
            font-size: 0.8rem; color: var(--gold-light); 
            margin-top: 5px; opacity: 0.85; letter-spacing: 0.05em;
        }

        /* --- 検索ボックス --- */
        .search-box { display: flex; align-items: center; gap: 8px; width: 100%; height: 50px; }
        .search-box input {
            flex: 1; height: 100%; padding: 0 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--gold-dark);
            border-radius: 25px;
            font-size: 1rem; color: #fff; outline: none; transition: 0.3s;
        }
        .search-box input::placeholder { color: rgba(252, 246, 186, 0.4); }
        .search-box input:focus { border-color: var(--gold-light); box-shadow: 0 0 12px rgba(212,175,55,0.4); }

        .search-btn-icon {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--gold-gradient);
            border: none; display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }
        .search-btn-icon svg { width: 24px; height: 24px; fill: #221500; }

        /* --- タグ --- */
        .tags-label { 
            font-size: 0.85rem; color: var(--gold-main); 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .tags-label::before, .tags-label::after {
            content: ""; flex: 1; height: 1px; background: var(--glass-border); max-width: 40px;
        }

        .tags { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .tag {
            padding: 12px 5px; border-radius: 12px;
            font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: 0.2s;
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid rgba(212, 175, 55, 0.35);
            color: var(--gold-light);
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }
        .tag:active { transform: scale(0.96); background: rgba(212, 175, 55, 0.3); }

        .main-btn {
            width: 100%; padding: 18px;
            background: var(--gold-gradient);
            color: #221500; border: none; border-radius: 50px;
            font-size: 1.1rem; font-weight: bold; letter-spacing: 0.05em;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(170, 119, 28, 0.4);
            transition: 0.2s;
        }
        .main-btn:active { transform: scale(0.98); }

        /* --- モーダル（みことば表示 ＆ 没入モード） --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 17, 8, 0.6);
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            opacity: 0; visibility: hidden; transition: 0.4s ease; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        /* 没入モード時の挙動（カードだけが消える） */
        .modal-overlay.immersive .modal-card { opacity: 0; transform: scale(1.05); pointer-events: none; }
        .modal-overlay.immersive .tap-hint { opacity: 0.3; }

        .modal-card {
            background: rgba(10, 15, 8, 0.85);
            width: 88%; max-width: 380px; padding: 45px 25px; 
            border-radius: 20px; text-align: center;
            border: 1px solid var(--gold-main);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(212,175,55,0.15);
            opacity: 0; transform: scale(0.9); transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .modal-overlay.active .modal-card { opacity: 1; transform: scale(1); }

        .verse-icon { font-size: 2.5rem; margin-bottom: 20px; display: block; opacity: 0; text-shadow: 0 0 15px rgba(212,175,55,0.8); }
        .verse-text {
            font-family: 'Shippori Mincho', serif; font-size: 1.35rem; line-height: 2;
            color: #fff; margin-bottom: 25px; font-weight: 500; opacity: 0;
            text-shadow: 0 2px 6px rgba(0,0,0,1);
        }
        .verse-ref { font-size: 1rem; color: var(--gold-main); display: block; margin-bottom: 35px; font-weight: bold; opacity: 0; letter-spacing: 0.1em; }

        .share-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; opacity: 0; }
        .share-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--gold-dark);
            background: rgba(0,0,0,0.6); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; 
        }
        .share-btn:active { transform: scale(0.92); background: rgba(212,175,55,0.3); }
        .share-btn svg { width: 22px; height: 22px; fill: var(--gold-light); }

        .close-btn { 
            background: transparent; color: var(--gold-light); border: 1px solid var(--gold-dark); 
            padding: 12px 40px; border-radius: 30px; font-size: 0.95rem; cursor: pointer; letter-spacing: 0.1em; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); background: rgba(0,0,0,0.4);
        }

        .tap-hint { 
            position: absolute; bottom: 30px; color: var(--gold-light); 
            font-size: 0.8rem; letter-spacing: 0.1em; pointer-events: none; opacity: 0.7;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            display: none; /* 初期は非表示 */
        }
        .modal-overlay.active .tap-hint { display: block; } /* モーダルが開いている時だけ表示 */

        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--gold-gradient); color: #221500; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; font-weight: bold; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 2000; box-shadow: 0 5px 15px rgba(0,0,0,0.7); }
        .toast.show { opacity: 1; visibility: visible; }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(15px); filter: blur(3px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        .animate-in { animation: floatUp 0.8s forwards; }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div class="overlay"></div>

    <div id="ui-wrapper">
        <div class="container">
            <header>
                <h1>御言葉サプリ 🌿</h1>
                <p>Eden Gold Edition</p>
            </header>

            <div class="search-box">
                <input type="text" id="userInput" placeholder="悩みや気分を入力..." onkeypress="handleKeyPress(event)">
                <button class="search-btn-icon" onclick="performKeywordSearch()">
                    <svg viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" /></svg>
                </button>
            </div>

            <div class="tags-label">カテゴリから選ぶ</div>
            <div class="tags">
                <div class="tag" onclick="filterByCategory('mental')">☁️ メンタル</div>
                <div class="tag" onclick="filterByCategory('work')">💼 お仕事</div>
                <div class="tag" onclick="filterByCategory('relation')">🤝 人間関係</div>
                <div class="tag" onclick="filterByCategory('self')">🪞 自分自身</div>
                <div class="tag" onclick="filterByCategory('future')">✨ 将来・決断</div>
                <div class="tag" onclick="filterByCategory('life')">💸 お金・試練</div>
            </div>

            <button class="main-btn" onclick="searchRandom()">おまかせで表示</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="toggleImmersive()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <span class="verse-icon">🌿</span>
            <div class="verse-text" id="modalText"></div>
            <span class="verse-ref" id="modalRef"></span>
            <div class="share-container" id="shareButtons">
                <button class="share-btn" onclick="shareAction('copy')" title="コピー">
                    <svg viewBox="0 0 24 24"><path d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z" /></svg>
                </button>
                <button class="share-btn" onclick="shareAction('x')" title="Xでシェア">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </button>
                <button class="share-btn" onclick="shareAction('line')" title="LINEで送る">
                    <svg viewBox="0 0 24 24"><path d="M22,10.8C22,5.9 17.5,2 12,2C6.5,2 2,5.9 2,10.8C2,14.8 4.7,18.3 8.6,19.3C9.1,19.4 9.4,19.7 9.3,20.2C9.3,20.2 9.1,21.3 9.1,21.4C9,21.8 9,22 9.3,22.1C9.6,22.1 10,21.9 10.2,21.8C10.2,21.8 15.3,18.4 15.3,18.4C19.4,16.5 22,13.8 22,10.8M12,14C11.4,14 11,13.6 11,13V9C11,8.4 11.4,8 12,8C12.6,8 13,8.4 13,9V13C13,13.6 12.6,14 12,14M8.5,14H6.5C5.9,14 5.5,13.6 5.5,13V9C5.5,8.4 5.9,8 6.5,8H8.5C9.1,8 9.5,8.4 9.5,9V13C9.5,13.6 9.1,14 8.5,14M17.5,14H15.5C14.9,14 14.5,13.6 14.5,13V9C14.5,8.4 14.9,8 15.5,8H17.5C18.1,8 18.5,8.4 18.5,9V13C18.5,13.6 18.1,14 17.5,14Z"/></svg>
                </button>
            </div>
            <button class="close-btn" onclick="closeModalButton(event)">閉じる</button>
        </div>
        <p class="tap-hint">背景タップで文字を隠す</p>
    </div>

    <div class="toast" id="toast">コピーしました🌿</div>

    <script>
        // エデンの園をテーマにした背景画像（Unsplashの高画質自然画像）
        const bgImages = {
            'mental': 'https://images.unsplash.com/photo-1505322022379-7c3353ee6291?auto=format&fit=crop&w=1200&q=80', // 黄金の朝靄
            'work': 'https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&w=1200&q=80', // 森に差し込む光
            'relation': 'https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1200&q=80', // 豊かな森の天蓋
            'self': 'https://images.unsplash.com/photo-1426604966848-d7adac402bff?auto=format&fit=crop&w=1200&q=80', // 静かな水面と黄金の光
            'future': 'https://images.unsplash.com/photo-1473773508845-188df298d2d1?auto=format&fit=crop&w=1200&q=80', // 黄金の野原と夜明け
            'life': 'https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?auto=format&fit=crop&w=1200&q=80', // 荘厳な自然
            'default': 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80' // エデンの園のイメージ
        };

        // ※ここに520個のbibleVersesデータを貼り付けてください
        const bibleVerses = [
            { "category": "mental", "keywords": ["不安", "明日", "心配"], "text": "明日のことまで心配しなくてよいのです。明日のことは明日が心配します。", "ref": "マタイ 6:34" },
            { "category": "work", "keywords": ["光", "良い行い", "模範"], "text": "あなたがたの光を人々の前で輝かせ、人々があなたがたの良い行いを見て、天の父をあがめるようにしなさい。", "ref": "マタイ 5:16" }
        ];

        let currentVerseText = "";
        let currentVerseRef = "";

        // ▼ モーダルが開いている時だけ、背景タップで没入モード（カードの透過）を切り替え
        function toggleImmersive() {
            const overlay = document.getElementById('modalOverlay');
            if (overlay.classList.contains('active')) {
                overlay.classList.toggle('immersive');
            }
        }

        function searchRandom() {
            const result = bibleVerses[Math.floor(Math.random() * bibleVerses.length)];
            displayModal(result);
        }

        function performKeywordSearch() {
            const input = document.getElementById('userInput').value.trim();
            let result;

            if (input) {
                const matched = bibleVerses.filter(v => 
                    v.keywords.some(k => k.includes(input)) || 
                    v.text.includes(input)
                );
                if (matched.length > 0) {
                    result = matched[Math.floor(Math.random() * matched.length)];
                } else {
                    result = { category: "default", text: "そのキーワードに合う言葉が見つかりませんでした。代わりに一つ処方します。", ref: "御言葉サプリ" };
                }
                displayModal(result);
            } else {
                searchRandom();
            }
        }

        function filterByCategory(category) {
            const filtered = bibleVerses.filter(v => v.category === category);
            if (filtered.length > 0) {
                displayModal(filtered[Math.floor(Math.random() * filtered.length)]);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') performKeywordSearch();
        }

        function displayModal(verse) {
            const textEl = document.getElementById('modalText');
            const refEl = document.getElementById('modalRef');
            const iconEl = document.querySelector('.verse-icon');
            const shareEl = document.getElementById('shareButtons');
            const overlay = document.getElementById('modalOverlay');
            const bgImage = document.getElementById('bg-image');

            currentVerseText = verse.text;
            currentVerseRef = verse.ref;

            textEl.innerText = verse.text;
            refEl.innerText = verse.ref;

            // 没入モードをリセット
            overlay.classList.remove('immersive');

            // 背景画像をカテゴリに合わせてエデンの園風に切り替え
            const newBgUrl = bgImages[verse.category] || bgImages['default'];
            bgImage.style.backgroundImage = `url('${newBgUrl}')`;

            [iconEl, textEl, refEl, shareEl].forEach(el => {
                el.classList.remove('animate-in');
                el.style.opacity = 0;
            });

            overlay.classList.add('active');

            setTimeout(() => iconEl.classList.add('animate-in'), 150);
            setTimeout(() => textEl.classList.add('animate-in'), 350);
            setTimeout(() => refEl.classList.add('animate-in'), 650);
            setTimeout(() => shareEl.classList.add('animate-in'), 850);
        }

        function closeModalButton(event) {
            if(event) event.stopPropagation(); // 没入モードの暴発を防ぐ
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('active');
            setTimeout(() => overlay.classList.remove('immersive'), 400); // 閉じたら没入モードもリセット
        }

        function shareAction(type) {
            const shareText = `${currentVerseText}\n（${currentVerseRef}）\n\n#御言葉サプリ #EdenGold`;
            const encodedText = encodeURIComponent(shareText);

            if (type === 'copy') {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(shareText).then(() => showToast("コピーしました🌿"))
                    .catch(() => fallbackCopy(shareText));
                } else {
                    fallbackCopy(shareText);
                }
            } else if (type === 'x') {
                window.open(`https://twitter.com/intent/tweet?text=${encodedText}`, '_blank');
            } else if (type === 'line') {
                window.open(`https://line.me/R/msg/text/?${encodedText}`, '_blank');
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try { document.execCommand('copy'); showToast("コピーしました🌿"); } catch (err) {}
            document.body.removeChild(textArea);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
